      summary: Marcar desafio como completo
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Desafio completo
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /school/students:
    get:
      tags: [School]
      summary: Listar todos os alunos da escola
      responses:
        '200':
          description: Lista de alunos
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /admin/stats:
    get:
      tags: [Admin]
      summary: Estatísticas globais da plataforma (admin)
      description: Apenas para administradores.
      responses:
        '200':
          description: Estatísticas da plataforma
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    additionalProperties: true
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Dados inválidos
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Token inválido ou expirado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Sem permissão para esta acção
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    UUID:
      type: string
      format: uuid
    Timestamps:
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    PaginatedMeta:
      type: object
      properties:
        total:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        last_page:
          type: integer
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
        errors:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
    AppRole:
      type: string
      enum: [parent, child, teen, teacher, admin, partner]
    TaskStatus:
      type: string
      enum: [pending, in_progress, completed, approved]
    TaskCategory:
      type: string
      enum: [cleaning, studying, helping, other]
    MissionStatus:
      type: string
      enum: [available, in_progress, completed]
    MissionType:
      type: string
      enum: [saving, budgeting, planning, custom, learning, social, goal, daily, weekly]
    MissionDifficulty:
      type: string
      enum: [beginner, explorer, saver, strategist, master]
    MissionSource:
      type: string
      enum: [parent, engine, admin, teacher]
    LedgerEntryType:
      type: string
      enum: [allowance, task_reward, mission_reward, purchase, donation, vault_deposit, vault_withdraw, vault_interest, transfer, adjustment, refund]
    WalletType:
      type: string
      enum: [virtual, real]
    RewardCategory:
      type: string
      enum: [experience, privilege, physical, digital]
    BudgetExceptionStatus:
      type: string
      enum: [pending, approved, rejected]
    RiskFlagType:
      type: string
      enum: [excessive_rewards, unusual_transactions, rate_limit_hit, task_exploitation]
    RiskSeverity:
      type: string
      enum: [low, medium, high, critical]
    SubscriptionTierType:
      type: string
      enum: [free, family_premium, school_institutional, partner_program, teacher]
    TenantType:
      type: string
      enum: [family, school, institutional_partner]
    NotificationEvent:
      type: string
      enum: [task_created, task_completed, task_approved, lesson_completed, donation_made, reward_claimed, allowance_sent, vault_deposit, vault_withdraw, vault_milestone, streak_milestone, badge_unlocked, level_up, budget_warning, system_broadcast]
    AuditAction:
      type: string
      enum: [insert, update, delete, login, logout, consent_granted, consent_revoked, role_changed, wallet_transfer, admin_action]
    UserProfile:
